<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Break Time</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      user-select: none;
    }
    .break-overlay {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      position: relative;
      overflow: hidden;
    }
    .break-overlay::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .break-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      width: 90%;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
    }
    .break-type-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }
    .badge-mini {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .badge-long {
      background: rgba(168, 85, 247, 0.2);
      color: #c084fc;
      border: 1px solid rgba(168, 85, 247, 0.3);
    }
    .break-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .break-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .break-idea {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 40px;
      line-height: 1.6;
      min-height: 3em;
    }
    .countdown-container {
      position: relative;
      width: 230px;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .progress-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: rotate(0deg);
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
    }
    .progress-ring__circle {
      transition: stroke-dashoffset 0.3s ease;
      transform-origin: 50% 50%;
    }
    .countdown-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .hourglass-wrapper {
      position: relative;
      width: 75px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 4px 15px rgba(59, 130, 246, 0.25));
      transition: filter 0.5s ease;
      margin-bottom: -2px;
    }
    .hourglass-wrapper.long-break {
      filter: drop-shadow(0 4px 15px rgba(168, 85, 247, 0.25));
    }
    .hourglass-svg {
      width: 100%;
      height: 100%;
    }
    .flowing-stream {
      stroke-dasharray: 6 4;
      animation: streamFlow 0.5s linear infinite;
    }
    @keyframes streamFlow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -20; }
    }
    
    /* Grains styling and animations */
    .sand-grain {
      opacity: 0;
    }
    .grain-1 {
      animation: fall-1 0.6s linear infinite;
    }
    .grain-2 {
      animation: fall-2 0.8s linear infinite;
      animation-delay: 0.15s;
    }
    .grain-3 {
      animation: fall-3 0.7s linear infinite;
      animation-delay: 0.35s;
    }
    
    @keyframes fall-1 {
      0% { transform: translateY(0); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(47px); opacity: 0.7; }
    }
    @keyframes fall-2 {
      0% { transform: translateY(0); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(45px) translateX(-1px); opacity: 0.7; }
    }
    @keyframes fall-3 {
      0% { transform: translateY(0); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(46px) translateX(1px); opacity: 0.7; }
    }

    @keyframes flipHourglass {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(180deg); }
    }
    .flip-active {
      animation: flipHourglass 0.8s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
    }
    .countdown-text {
      font-size: 2.2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #f1f5f9;
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.35);
    }
    .progress-label {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .break-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .break-btn {
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .break-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
    .break-btn:active { transform: translateY(0); }
    .btn-skip {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }
    .btn-skip:hover { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
    .btn-postpone {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .btn-postpone:hover {
      background: rgba(148, 163, 184, 0.2);
      color: #e2e8f0;
    }
    .postpone-info {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 16px;
    }
    .particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="break-overlay" id="breakOverlay">
    <div id="jsErrorLog" style="position: fixed; bottom: 10px; left: 10px; background: rgba(220, 50, 50, 0.9); color: white; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; z-index: 10000; max-width: 90%; display: none;"></div>
    <div class="particles" id="particles"></div>
    <div class="break-content">
      <div class="break-type-badge badge-mini" id="breakBadge">MINI BREAK</div>
      <div class="break-icon" id="breakIcon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80" style="vertical-align: middle;">
          <!-- Top Left Heart -->
          <path d="M 25 22 C 22 18, 17 20, 17 24 C 17 29, 25 35, 25 35 C 25 35, 33 29, 33 24 C 33 20, 28 18, 25 22 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
          <!-- Top Right Heart -->
          <path d="M 68 22 C 65 18, 60 20, 60 24 C 60 29, 68 35, 68 35 C 68 35, 76 29, 76 24 C 76 20, 71 18, 68 22 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
          <!-- Middle Left Heart -->
          <path d="M 21 51 C 18 47, 13 49, 13 53 C 13 58, 21 64, 21 64 C 21 64, 29 58, 29 53 C 29 49, 24 47, 21 51 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
          <!-- Bottom Right Heart -->
          <path d="M 75 66 C 72 62, 67 64, 67 68 C 67 73, 75 79, 75 79 C 75 79, 83 73, 83 68 C 83 64, 78 62, 75 66 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
          <!-- Bottom Center Heart -->
          <path d="M 64 80 C 61 76, 56 78, 56 82 C 56 87, 64 93, 64 93 C 64 93, 72 87, 72 82 C 72 78, 67 76, 64 80 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
          <!-- Olive Branch in Beak -->
          <path d="M 66 47 Q 76 46, 86 38" fill="none" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" />
          <path d="M 72 43 C 71 39, 74 37, 76 39 C 78 41, 75 45, 72 43 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
          <path d="M 79 39 C 77 35, 80 33, 82 35 C 84 37, 82 41, 79 39 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
          <path d="M 85 35 C 83 31, 86 29, 88 31 C 90 33, 88 37, 85 35 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
          <path d="M 81 44 C 83 41, 86 41, 85 44 C 84 47, 81 47, 81 44 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
          <!-- Dove wings, body -->
          <path d="M 48 40 C 44 26, 38 18, 44 16 C 50 14, 55 24, 57 38 Z" fill="#99d6d6" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M 33 73 C 27 75, 29 65, 33 61 C 27 61, 27 55, 31 51 C 37 45, 49 43, 57 45 C 63 45, 69 39, 72 42 C 74 44, 69 51, 61 54 C 51 57, 43 67, 33 73 Z" fill="#99d6d6" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M 43 51 C 35 33, 25 23, 33 21 C 43 19, 49 35, 50 47 Z" fill="#99d6d6" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="65" cy="44" r="1.5" fill="#1d3e3a" />
        </svg>
      </div>
      <h1 class="break-title" id="breakTitle">Time for a Break!</h1>
      <p class="break-idea" id="breakIdea">Stand up and stretch your arms above your head</p>
      
      <div class="countdown-container">
        <!-- Circular Progress Ring -->
        <svg viewBox="0 0 220 220" class="progress-ring">
          <circle class="progress-ring__background" stroke="rgba(255, 255, 255, 0.04)" stroke-width="6" fill="transparent" r="95" cx="110" cy="110"/>
          <circle id="ringFg" class="progress-ring__circle" stroke="url(#ringGradient)" stroke-width="8" stroke-linecap="round" fill="transparent" r="95" cx="110" cy="110" transform="rotate(-90 110 110)" />
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#60a5fa" id="ringStopStart" />
              <stop offset="100%" stop-color="#3b82f6" id="ringStopEnd" />
            </linearGradient>
          </defs>
        </svg>

        <div class="countdown-inner">
          <div class="hourglass-wrapper" id="hourglassWrapper">
            <svg viewBox="0 0 100 120" class="hourglass-svg">
              <defs>
                <clipPath id="clipTop">
                  <path id="clipTopPath" d="M 0,120 L 0,15 L 100,15 L 100,120 Z" />
                </clipPath>
                <clipPath id="clipBottom">
                  <path id="clipBottomPath" d="M 0,120 L 100,120 Z" />
                </clipPath>
                <linearGradient id="sandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#60a5fa" id="sandStopStart" />
                  <stop offset="100%" stop-color="#3b82f6" id="sandStopEnd" />
                </linearGradient>
              </defs>
              
              <!-- Glass Glow background -->
              <path d="M30,10 L30,35 Q30,55 45,58 L45,62 Q30,65 30,85 L30,110 L70,110 L70,85 Q70,65 55,62 L55,58 Q70,55 70,35 L70,10 Z" fill="rgba(255, 255, 255, 0.03)" />
  
              <!-- Grains falling (drawn behind bottom sand so they disappear inside it) -->
              <circle id="grain1" cx="50" cy="58" r="1.2" fill="url(#sandGradient)" class="sand-grain grain-1" />
              <circle id="grain2" cx="50" cy="58" r="0.8" fill="url(#sandGradient)" class="sand-grain grain-2" />
              <circle id="grain3" cx="50" cy="58" r="1" fill="url(#sandGradient)" class="sand-grain grain-3" />
  
              <!-- Flowing Sand Stream -->
              <line id="sandStream" class="flowing-stream" x1="50" y1="58" x2="50" y2="105" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2.5" stroke-linecap="round" />
  
              <!-- Top Sand -->
              <path id="topSand" d="M30,15 L70,15 L70,35 Q70,55 55,58 L45,58 Q30,55 30,35 Z" fill="url(#sandGradient)" clip-path="url(#clipTop)" />
              
              <!-- Bottom Sand -->
              <path id="bottomSand" d="M45,62 Q30,65 30,85 L30,105 L70,105 L70,85 Q70,65 55,62 Z" fill="url(#sandGradient)" clip-path="url(#clipBottom)" />
  
              <!-- Frame & Glass Outline -->
              <path d="M20,10 L80,10 M20,110 L80,110 M30,10 L30,35 Q30,55 45,58 L45,62 Q30,65 30,85 L30,110 M70,10 L70,35 Q70,55 55,58 L55,62 Q70,65 70,85 L70,110" fill="none" stroke="rgba(255, 255, 255, 0.25)" stroke-width="4" stroke-linecap="round" />
              
              <!-- Glass Shines -->
              <path d="M33,18 Q33,35 46,55" fill="none" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" stroke-linecap="round" />
              <path d="M67,102 Q67,85 54,65" fill="none" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" stroke-linecap="round" />
            </svg>
          </div>
          <div class="countdown-text" id="countdownText">0:20</div>
        </div>
      </div>
      
      <p class="progress-label" id="progressLabel">Break in progress</p>
      
      <div class="break-actions">
        <button class="break-btn btn-postpone" id="btnPostpone" onclick="postponeBreak()">
          ⏰ Postpone
        </button>
        <button class="break-btn btn-skip" id="btnSkip" onclick="skipBreak()">
          ✓ End Break
        </button>
      </div>
      <p class="postpone-info" id="postponeInfo"></p>
    </div>
  </div>

  <script>
    window.onerror = function(msg, url, line, col, error) {
      const el = document.getElementById('jsErrorLog');
      if (el) {
        el.style.display = 'block';
        el.innerText = `Error: ${msg}\nLine: ${line}:${col}\nURL: ${url}`;
      }
      return false;
    };

    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    
    const CIRCUMFERENCE = 2 * Math.PI * 95; // ~596.90
    let totalDuration = 0;
    let remaining = 0;
    let isLong = false;
    let ideaIndex = 0;
    let audioCtx = null;
    let postponeCount = 0;
    let postponeLimit = 3;
    let soundVolume = 0.12;
    let allowForceExit = true;
    let breakBgColor = "#0f172a";
    let lastRemaining = 0;

    function triggerFlip() {
      const wrapper = document.getElementById('hourglassWrapper');
      if (wrapper) {
        wrapper.classList.remove('flip-active');
        void wrapper.offsetWidth; // trigger reflow
        wrapper.classList.add('flip-active');
        setTimeout(() => {
          wrapper.classList.remove('flip-active');
        }, 800);
      }
    }
    
    // Break ideas shown during breaks
    const breakIdeas = [
      '🧘 Stand up and stretch your arms above your head',
      '👀 Look at something 20 feet away for 20 seconds',
      '💧 Take a sip of water',
      '🫁 Take 5 deep breaths — inhale for 4s, exhale for 6s',
      '🚶 Walk around your room for a minute',
      '🤸 Roll your shoulders forward and backward 10 times',
      '😊 Smile! It releases endorphins and reduces stress',
      '🌿 Look out a window and focus on something green',
      '👋 Shake out your hands and wrists to release tension',
      '🧠 Close your eyes and think of 3 things you\'re grateful for',
      '💪 Do 10 desk push-ups or wall push-ups',
      '🔄 Rotate your neck slowly in circles, 5 times each direction',
      '🦶 Point your toes up and down 20 times to improve circulation',
      '🎵 Listen to a favorite song snippet with eyes closed',
      '🪑 Check your posture — sit up straight, feet flat on floor',
      '🌻 Take a moment to appreciate your workspace',
      '🤲 Press your palms together firmly for 10 seconds, then release',
      '📝 Write down one thing you accomplished today so far',
      '🧘‍♂️ Do a quick 30-second meditation — focus on breathing',
      '💺 Stand up and do 5 squats',
      '👁️ Remember: 20-20-20 rule — every 20 min, look at something 20ft away for 20 sec',
      '🎨 Look at something colorful — it refreshes visual processing',
      '🗣️ Say something positive to yourself or a colleague',
      '🦴 Stretch your fingers wide, hold 5s, make a fist. Repeat 5 times',
      '🌞 If possible, step outside for a breath of fresh air',
      '☕ Refill your water bottle or make a healthy drink',
      '🧹 Organize one small area of your desk',
      '🫶 Give yourself a gentle hand massage to relieve tension',
      '🎶 Hum your favorite tune for 30 seconds',
      '🫁 Box breathing: inhale 4s, hold 4s, exhale 4s, hold 4s'
    ];
    
    // Create floating particles
    function createParticles() {
      const container = document.getElementById('particles');
      container.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.background = isLong ? '#c084fc' : '#60a5fa';
        p.style.animationDuration = (Math.random() * 15 + 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(p);
      }
    }
    
    function updateUI() {
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      document.getElementById('countdownText').textContent = mins + ':' + String(secs).padStart(2, '0');
      
      const progress = totalDuration > 0 ? remaining / totalDuration : 0;
      
      // Update circular progress ring
      const ringFg = document.getElementById('ringFg');
      if (ringFg) {
        ringFg.style.strokeDasharray = CIRCUMFERENCE;
        const offset = CIRCUMFERENCE * (1 - progress);
        ringFg.style.strokeDashoffset = offset;
      }

      // Auto-trigger flip animation if remaining time was reset / increased
      if (remaining > lastRemaining && lastRemaining > 0) {
        triggerFlip();
      }
      lastRemaining = remaining;

      // Top sand depletion with funneling (Y from 15 to 58)
      const clipTopPath = document.getElementById('clipTopPath');
      if (clipTopPath) {
        if (progress <= 0) {
          clipTopPath.setAttribute('d', 'M 0,120 L 0,58 L 100,58 L 100,120 Z');
        } else {
          const y = 15 + (1 - progress) * 43;
          const centerY = Math.min(58, y + 2 + (1 - progress) * 6);
          clipTopPath.setAttribute('d', `M 0,120 L 0,${y} Q 50,${centerY} 100,${y} L 100,120 Z`);
        }
      }
      
      // Bottom sand piling up (mound expands then rises up the side walls)
      const clipBottomPath = document.getElementById('clipBottomPath');
      if (clipBottomPath) {
        const fill = 1 - progress;
        if (fill <= 0) {
          clipBottomPath.setAttribute('d', 'M 0,120 L 100,120 Z');
        } else if (fill < 0.45) {
          const peakY = 105 - (fill / 0.45) * 20;
          const baseWidth = (fill / 0.45) * 38;
          const leftX = 50 - baseWidth / 2;
          const rightX = 50 + baseWidth / 2;
          clipBottomPath.setAttribute('d', `M ${leftX},105 Q 50,${peakY} ${rightX},105 Z`);
        } else {
          const extra = (fill - 0.45) / 0.55;
          const sideY = 105 - extra * 25;
          const peakY = 85 - extra * 18;
          clipBottomPath.setAttribute('d', `M 30,105 L 30,${sideY} Q 50,${peakY} 70,${sideY} L 70,105 Z`);
        }
      }
      
      // Flowing stream opacity and falling grains
      const stream = document.getElementById('sandStream');
      const isFlowing = remaining > 0 && progress < 1 && progress > 0;
      if (stream) {
        stream.style.opacity = isFlowing ? '1' : '0';
      }

      const grains = document.querySelectorAll('.sand-grain');
      grains.forEach(g => {
        g.style.display = isFlowing ? 'block' : 'none';
      });
      
      // Toggle long-break styling on wrappers
      const wrapper = document.getElementById('hourglassWrapper');
      if (wrapper) {
        if (isLong) {
          wrapper.classList.add('long-break');
        } else {
          wrapper.classList.remove('long-break');
        }
      }
      
      // Sand & Ring colors based on type
      const stopStart = document.getElementById('sandStopStart');
      const stopEnd = document.getElementById('sandStopEnd');
      if (stopStart && stopEnd) {
        stopStart.setAttribute('stop-color', isLong ? '#c084fc' : '#60a5fa');
        stopEnd.setAttribute('stop-color', isLong ? '#a855f7' : '#3b82f6');
      }

      const ringStopStart = document.getElementById('ringStopStart');
      const ringStopEnd = document.getElementById('ringStopEnd');
      if (ringStopStart && ringStopEnd) {
        ringStopStart.setAttribute('stop-color', isLong ? '#c084fc' : '#60a5fa');
        ringStopEnd.setAttribute('stop-color', isLong ? '#a855f7' : '#3b82f6');
      }

      const btnSkip = document.getElementById('btnSkip');
      if (btnSkip) {
        btnSkip.style.display = allowForceExit ? 'flex' : 'none';
      }
    }

    function applyBackgroundColor(color) {
      if (!color) return;
      breakBgColor = color;
      const overlay = document.getElementById('breakOverlay');
      if (overlay) {
        overlay.style.background = `radial-gradient(circle at center, ${color}cc 0%, ${color}ff 100%)`;
      }
    }
    
    function updatePostponeInfo() {
      const info = document.getElementById('postponeInfo');
      const btn = document.getElementById('btnPostpone');
      if (postponeCount >= postponeLimit) {
        info.textContent = 'No postpones remaining';
        btn.style.opacity = '0.4';
        btn.style.pointerEvents = 'none';
      } else {
        info.textContent = `${postponeLimit - postponeCount} postpone${postponeLimit - postponeCount > 1 ? 's' : ''} remaining`;
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      }
    }
    
    function playBreakSound() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Pleasant chime
        const frequencies = [523.25, 659.25, 783.99]; // C5, E5, G5
        frequencies.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.value = soundVolume;
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5 + i * 0.15);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(audioCtx.currentTime + i * 0.15);
          osc.stop(audioCtx.currentTime + 1.5 + i * 0.15);
        });
      } catch (e) {}
    }
    
    function playEndSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 440;
        gain.gain.value = soundVolume;
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } catch (e) {}
    }
    
    function setBreakType(type) {
      isLong = type === 'long';
      const badge = document.getElementById('breakBadge');
      const icon = document.getElementById('breakIcon');
      const title = document.getElementById('breakTitle');
      
      if (isLong) {
        badge.className = 'break-type-badge badge-long';
        badge.textContent = 'LONG BREAK';
        icon.innerHTML = '🌿';
        title.textContent = 'Take a Longer Break!';
      } else {
        badge.className = 'break-type-badge badge-mini';
        badge.textContent = 'MINI BREAK';
        icon.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80" style="vertical-align: middle;">
            <!-- Top Left Heart -->
            <path d="M 25 22 C 22 18, 17 20, 17 24 C 17 29, 25 35, 25 35 C 25 35, 33 29, 33 24 C 33 20, 28 18, 25 22 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
            <!-- Top Right Heart -->
            <path d="M 68 22 C 65 18, 60 20, 60 24 C 60 29, 68 35, 68 35 C 68 35, 76 29, 76 24 C 76 20, 71 18, 68 22 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
            <!-- Middle Left Heart -->
            <path d="M 21 51 C 18 47, 13 49, 13 53 C 13 58, 21 64, 21 64 C 21 64, 29 58, 29 53 C 29 49, 24 47, 21 51 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
            <!-- Bottom Right Heart -->
            <path d="M 75 66 C 72 62, 67 64, 67 68 C 67 73, 75 79, 75 79 C 75 79, 83 73, 83 68 C 83 64, 78 62, 75 66 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
            <!-- Bottom Center Heart -->
            <path d="M 64 80 C 61 76, 56 78, 56 82 C 56 87, 64 93, 64 93 C 64 93, 72 87, 72 82 C 72 78, 67 76, 64 80 Z" fill="#fda4af" stroke="#1d3e3a" stroke-width="2.5" stroke-linejoin="round" />
            <!-- Olive Branch in Beak -->
            <path d="M 66 47 Q 76 46, 86 38" fill="none" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" />
            <path d="M 72 43 C 71 39, 74 37, 76 39 C 78 41, 75 45, 72 43 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
            <path d="M 79 39 C 77 35, 80 33, 82 35 C 84 37, 82 41, 79 39 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
            <path d="M 85 35 C 83 31, 86 29, 88 31 C 90 33, 88 37, 85 35 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
            <path d="M 81 44 C 83 41, 86 41, 85 44 C 84 47, 81 47, 81 44 Z" fill="#acd992" stroke="#1d3e3a" stroke-width="2" stroke-linejoin="round" />
            <!-- Dove wings, body -->
            <path d="M 48 40 C 44 26, 38 18, 44 16 C 50 14, 55 24, 57 38 Z" fill="#99d6d6" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M 33 73 C 27 75, 29 65, 33 61 C 27 61, 27 55, 31 51 C 37 45, 49 43, 57 45 C 63 45, 69 39, 72 42 C 74 44, 69 51, 61 54 C 51 57, 43 67, 33 73 Z" fill="#99d6d6" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M 43 51 C 35 33, 25 23, 33 21 C 43 19, 49 35, 50 47 Z" fill="#99d6d6" stroke="#1d3e3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="65" cy="44" r="1.5" fill="#1d3e3a" />
          </svg>
        `;
        title.textContent = 'Time for a Break!';
      }
      createParticles();
    }
    
    function setBreakIdea(idea) {
      if (idea) {
        document.getElementById('breakIdea').textContent = idea;
      } else {
        ideaIndex = (ideaIndex + 1) % breakIdeas.length;
        document.getElementById('breakIdea').textContent = breakIdeas[ideaIndex];
      }
    }
    
    async function postponeBreak() {
      try {
        const result = await invoke('cmd_break_postpone');
        if (result) {
          postponeCount = result.postpone_count || 0;
          postponeLimit = result.postpone_limit || 3;
          updatePostponeInfo();
          // The window will be hidden by the backend
          playEndSound();
        }
      } catch (e) {
        console.error('Postpone failed:', e);
      }
    }
    
    async function skipBreak() {
      try {
        await invoke('cmd_break_skip');
        playEndSound();
      } catch (e) {
        console.error('Skip failed:', e);
      }
    }
    
    async function init() {
      createParticles();
      
      // Set ring circumference if exists
      const ringFg = document.getElementById('ringFg');
      if (ringFg) {
        ringFg.style.strokeDasharray = CIRCUMFERENCE;
      }
      
      // Get initial state FIRST
      try {
        const state = await invoke('cmd_break_status');
        if (state) {
          postponeCount = state.postpone_count || 0;
          postponeLimit = state.postpone_limit || 3;
          isLong = state.is_long;
          remaining = state.countdown_secs || 0;
          setBreakType(isLong ? 'long' : 'mini');
          if (state.current_idea) setBreakIdea(state.current_idea);
          updatePostponeInfo();
        }
        const st = await invoke("get_settings");
        if (st) {
          if (st.break_sound_volume !== undefined) {
            soundVolume = st.break_sound_volume / 100;
          }
          if (st.break_allow_force_exit !== undefined) {
            allowForceExit = st.break_allow_force_exit;
          }
          if (st.break_bg_color) {
            applyBackgroundColor(st.break_bg_color);
          }
          totalDuration = isLong ? st.break_long_duration_seconds : st.break_mini_duration_seconds;
        } else {
          totalDuration = remaining;
        }
      } catch (e) {}
      updateUI();
      
      // Listen for break events
      await listen('break-started', (event) => {
        const idea = event.payload;
        playBreakSound();
        setBreakIdea(idea);
        
        // Get current state for duration
        invoke('cmd_break_status').then(async (state) => {
          if (state) {
            isLong = state.is_long;
            setBreakType(isLong ? 'long' : 'mini');
            try {
              const st = await invoke("get_settings");
              if (st) {
                totalDuration = isLong ? st.break_long_duration_seconds : st.break_mini_duration_seconds;
                if (st.break_allow_force_exit !== undefined) {
                  allowForceExit = st.break_allow_force_exit;
                }
                if (st.break_bg_color) {
                  applyBackgroundColor(st.break_bg_color);
                }
              } else {
                totalDuration = state.countdown_secs || (isLong ? 300 : 20);
              }
            } catch (e) {
              totalDuration = state.countdown_secs || (isLong ? 300 : 20);
            }
            remaining = state.countdown_secs || totalDuration;
            postponeCount = state.postpone_count || 0;
            postponeLimit = state.postpone_limit || 3;
            updatePostponeInfo();
            updateUI();
          }
        });
      });
      
      await listen('break-pre-notification', (event) => {
        const idea = event.payload;
        setBreakIdea(idea);
        // Pre-break: show short countdown
        invoke('cmd_break_status').then(state => {
          if (state) {
            isLong = state.is_long;
            setBreakType(isLong ? 'long' : 'mini');
            totalDuration = state.countdown_secs || 10;
            remaining = totalDuration;
            document.getElementById('progressLabel').textContent = 'Break starting soon...';
            invoke("get_settings").then(st => {
              if (st && st.break_bg_color) {
                applyBackgroundColor(st.break_bg_color);
              }
            });
            updateUI();
          }
        });
      });
      
      await listen('break-finished', () => {
        document.getElementById('progressLabel').textContent = 'Break complete! Enjoy your work.';
      });
      
      await listen('break-postponed', () => {
        // Window will be hidden
      });
      
      await listen('break-reset', () => {
        remaining = 0;
        updateUI();
      });
      
      // Countdown timer
      setInterval(async () => {
        if (remaining > 0) {
          remaining--;
          updateUI();
        } else {
          // Fetch current state to sync
          try {
            const state = await invoke('cmd_break_status');
            if (state && state.countdown_secs !== undefined) {
              totalDuration = state.countdown_secs;
              remaining = state.countdown_secs;
              isLong = state.is_long;
              setBreakType(isLong ? 'long' : 'mini');
              const st = await invoke("get_settings");
              if (st && st.break_bg_color) {
                applyBackgroundColor(st.break_bg_color);
              }
            }
          } catch (e) {}
        }
      }, 1000);
      
      // Periodic sync
      setInterval(async () => {
        try {
          const state = await invoke('cmd_break_status');
          if (state) {
            remaining = state.countdown_secs || 0;
            if (totalDuration === 0) totalDuration = remaining;
            isLong = state.is_long;
            setBreakType(isLong ? 'long' : 'mini');
            postponeCount = state.postpone_count || 0;
            postponeLimit = state.postpone_limit || 3;
            updatePostponeInfo();
            updateUI();
          }
        } catch (e) {}
      }, 3000);
    }
    
    init();
  </script>
</body>
