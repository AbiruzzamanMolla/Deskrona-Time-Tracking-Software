<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deskrona Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .overlay-container {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, rgba(11, 26, 43, 0.9), rgba(8, 21, 36, 0.92));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(95, 139, 184, 0.45);
      border-radius: 10px;
      display: grid;
      grid-template-columns: 12px 1fr 36px;
      align-items: stretch;
      padding: 3px;
      user-select: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .drag-strip {
      background: linear-gradient(180deg, rgba(123, 166, 208, 0.45), rgba(70, 112, 153, 0.45));
      border: 1px solid rgba(168, 202, 237, 0.45);
      border-radius: 6px;
      cursor: move;
      -webkit-app-region: no-drag;
      position: relative;
    }
    .drag-strip::before {
      content: "";
      position: absolute;
      inset: 6px 3px;
      border-radius: 3px;
      background:
        radial-gradient(circle at 50% 4px, rgba(255,255,255,.8) 1px, transparent 1.4px) 0 0/100% 8px;
      opacity: 0.8;
    }
    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 8px;
      min-width: 0;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      background: #ccc;
    }
    .status-dot.running { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
    .status-dot.paused { background: #ff9800; box-shadow: 0 0 8px #ff9800; }
    .status-dot.stopped { background: #f44336; }

    .status-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .time-display {
      color: #f5f9ff;
      font-size: 34px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      line-height: 0.95;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
      white-space: nowrap;
    }
    .control-btn {
      -webkit-app-region: no-drag;
      background: linear-gradient(180deg, rgba(250, 253, 255, 0.18), rgba(228, 240, 255, 0.08));
      border: 1px solid rgba(169, 206, 244, 0.45);
      cursor: pointer;
      width: 100%;
      height: 100%;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      border-radius: 8px;
      transition: all 0.2s;
      color: #f2f8ff;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .control-btn:hover {
      background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(236, 247, 255, 0.16));
      border-color: rgba(190, 224, 255, 0.7);
    }
    .control-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="overlay-container" id="overlay">
    <div class="drag-strip" id="dragStrip" title="Drag overlay"></div>
    <div class="content">
      <div class="status-bar">
        <div style="display: flex; align-items: center;">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-label" id="statusLabel">Stopped</span>
        </div>
        <span class="status-label" style="font-size: 9px; opacity: 0.5;">TODAY</span>
      </div>
      <span class="time-display" id="timeDisplay">00:00:00</span>
    </div>
    <button class="control-btn" id="toggleBtn" title="Pause tracking">⏸</button>
  </div>
  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    let currentStatus = 'stopped';
    let syncInterval = null;

    async function init() {
      console.log('Overlay initialized');
      const toggleBtn = document.getElementById('toggleBtn');
      const dot = document.getElementById('statusDot');
      const label = document.getElementById('statusLabel');
      const timeDisplay = document.getElementById('timeDisplay');

      function formatSeconds(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }

      function updateUI(status, time) {
        console.log('Updating UI:', status, time);
        if (typeof time === 'string' && time.length > 0) {
          timeDisplay.textContent = time;
        }
        
        currentStatus = status;
        dot.className = 'status-dot ' + status;
        
        if (status === 'running') {
          label.textContent = 'Active';
          toggleBtn.textContent = '⏸';
          toggleBtn.title = 'Pause tracking';
          toggleBtn.disabled = false;
        } else if (status === 'paused') {
          label.textContent = 'Paused';
          toggleBtn.textContent = '▶';
          toggleBtn.title = 'Start tracking';
          toggleBtn.disabled = false;
        } else {
          label.textContent = 'Stopped';
          toggleBtn.textContent = '▶';
          toggleBtn.title = 'Start tracking';
          toggleBtn.disabled = false;
          dot.className = 'status-dot stopped';
        }
      }

      async function syncFromApi() {
        try {
          const [status, stats] = await Promise.all([
            invoke('cmd_get_tracking'),
            invoke('cmd_get_dashboard_data')
          ]);
          const activeSeconds = Number(stats?.total_active_seconds ?? 0);
          updateUI(status, formatSeconds(activeSeconds));
        } catch (e) {
          console.error('Overlay API sync failed:', e);
        }
      }

      // Initial status
      await syncFromApi();
      syncInterval = setInterval(syncFromApi, 1000);

      // Listen for updates from backend
      await listen('update-overlay', (event) => {
        const { time, status } = event.payload;
        updateUI(status, time);
      });
      
      // Also listen for status changes directly to be snappier
      await listen('tracking-status-changed', (event) => {
        updateUI(event.payload);
      });

      async function setTracking(status) {
        try {
          await invoke('cmd_set_tracking', { status });
          await syncFromApi();
        } catch (e) {
          console.error('Failed to set tracking:', e);
        }
      }

      toggleBtn.addEventListener('click', () => {
        const nextStatus = currentStatus === 'running' ? 'paused' : 'running';
        setTracking(nextStatus);
      });
    }

    init();

    // Drag functionality
    const overlay = document.getElementById('overlay');
    const dragStrip = document.getElementById('dragStrip');
    
    dragStrip.addEventListener('mousedown', async () => {
      try {
        await invoke('start_drag_overlay');
      } catch(e) {
        console.error('Drag failed:', e);
      }
    });

    document.addEventListener('mouseup', async () => {
      try {
        await invoke('end_drag_overlay');
      } catch(e) {}
    });
  </script>
</body>
</html>
